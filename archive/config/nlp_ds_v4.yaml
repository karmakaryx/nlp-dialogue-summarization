general:
  model_name: "digit82/kobart-summarization"

tokenizer:
  encoder_max_len: 1024
  decoder_max_len: 256
  special_tokens:
    - "#Person1#"
    - "#Person2#"
    - "#Person3#"
    - "#Person4#"
    - "#Person5#"
    - "#Person6#"
    - "#Person7#"
    - "#PhoneNumber#"
    - "#Address#"
    - "#DateOfBirth#"
    - "#PassportNumber#"
    - "#SSN#"
    - "#CardNumber#"
    - "#CarNumber#"
    - "#Email#"

training:
  # 실행 제어 및 모드 (Execution & Modes)
  overwrite_output_dir: true
  seed: 42
  report_to: "wandb"

  # 하이퍼파라미터 (Hyperparameters)
  num_train_epochs: 15
  learning_rate: 0.00003
  label_smoothing_factor: 0.1
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  weight_decay: 0.01
  max_grad_norm: 0.3
  optim: "paged_adamw_8bit"

  # 리소스 및 효율화 (Resources & Efficiency)
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 16
  gradient_accumulation_steps: 2
  gradient_checkpointing: true
  dataloader_num_workers: 4
  group_by_length: true
  bf16: true

  # 검증 및 저장 전략 (Evaluation & Save Strategies)
  eval_strategy: "epoch"
  save_strategy: "epoch"
  save_total_limit: 3
  logging_strategy: "steps"
  logging_steps: 100

  # 최적 모델 관리 (Best Model Selection)
  generation_max_length: 256
  load_best_model_at_end: true
  predict_with_generate: true
  early_stopping_patience: 3
  early_stopping_threshold: 0.001

inference:
  # 생성 제어 및 품질 (Generation Control)
  batch_size: 32
  generate_max_length: 150
  min_length: 30
  length_penalty: 1.5
  num_beams: 5
  no_repeat_ngram_size: 3
  repetition_penalty: 1.2
  early_stopping: true
