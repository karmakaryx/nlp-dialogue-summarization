general:
  model_name: "yanolja/KoSOLAR-10.7B-v0.2"

tokenizer:
  encoder_max_len: 2048
  decoder_max_len: 300
  special_tokens:
    - "#Person1#"
    - "#Person2#"
    - "#Person3#"
    - "#Person4#"
    - "#Person5#"
    - "#Person6#"
    - "#Person7#"
    - "#PhoneNumber#"
    - "#Address#"
    - "#DateOfBirth#"
    - "#PassportNumber#"
    - "#SSN#"
    - "#CardNumber#"
    - "#CarNumber#"
    - "#Email#"

training:
  # 실행 제어 및 모드 (Execution & Modes)
  do_train: true
  do_eval: false
  overwrite_output_dir: true
  seed: 777
  report_to: "wandb"

  # 하이퍼파라미터 (Hyperparameters)
  num_train_epochs: 2
  max_steps: 1000
  learning_rate: 0.00001
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  weight_decay: 0.01
  max_grad_norm: 0.3
  optim: "paged_adamw_8bit"

  # 리소스 및 효율화 (Resources & Efficiency)
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 4
  gradient_checkpointing: true
  dataloader_num_workers: 4
  group_by_length: true
  bf16: true

  # 검증 및 저장 전략 (Evaluation & Save Strategies)
  eval_strategy: "no"
  eval_steps: 500
  save_strategy: "steps"
  save_steps: 500
  save_total_limit: 10
  logging_strategy: "steps"
  logging_steps: 50

  # 최적 모델 관리 (Best Model Selection)
  load_best_model_at_end: false
  generation_max_length: 100

inference:
  # 생성 제어 및 품질 (Generation Control)
  batch_size: 1
  max_new_tokens: 300
  min_length: 30
  length_penalty: 1.5
  num_beams: 4
  no_repeat_ngram_size: 3
  repetition_penalty: 1.2
  early_stopping: true

wandb:
  project: "nlp-dialogue-summarization"
